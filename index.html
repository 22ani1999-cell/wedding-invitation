```html
<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Montserrat',sans-serif;
color:white;
overflow-x:hidden;
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:
linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.45)),
url("https://images.unsplash.com/photo-1520854221256-17451cc331bf?q=80&w=2070");
background-size:cover;
background-position:center;
padding:20px;
}

.ring{
font-size:40px;
margin-bottom:20px;
}

.names{
font-family:'Great Vibes',cursive;
font-size:70px;
line-height:1.2;
margin-bottom:20px;
}

.date{
font-size:20px;
letter-spacing:3px;
margin-bottom:40px;
}

/* COUNTDOWN */

.countdown{
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
}

.time-box{
backdrop-filter:blur(10px);
background:rgba(255,255,255,0.2);
border-radius:12px;
padding:20px 25px;
min-width:90px;
}

.time-box span{
display:block;
font-size:32px;
font-weight:600;
}

/* SECTION */

.section{
padding:80px 20px;
background:#faf7f4;
color:#333;
text-align:center;
}

.section h2{
font-size:36px;
margin-bottom:40px;
}

/* CARDS */

.grid{
max-width:900px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:30px;
}

.card{
background:white;
padding:30px;
border-radius:14px;
box-shadow:0 15px 30px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card i{
font-size:40px;
color:#c8a96a;
margin-bottom:15px;
}

.card h3{
margin-bottom:10px;
}

/* FOOTER */

.footer{
padding:40px;
background:#f1ece7;
color:#333;
font-size:18px;
}

</style>
</head>

<body>

<section class="hero">

<div class="ring">
<i class="fa-solid fa-ring"></i>
</div>

<div class="names">
Արտյոմ Սիմոնյան <br> և <br> Անի Ներսեսյան
</div>

<div class="date">
27 Հունիս 2026
</div>

<div class="countdown">

<div class="time-box">
<span id="days">0</span>
օր
</div>

<div class="time-box">
<span id="hours">0</span>
ժամ
</div>

<div class="time-box">
<span id="minutes">0</span>
րոպե
</div>

<div class="time-box">
<span id="seconds">0</span>
վայրկյան
</div>

</div>

</section>

<section class="section">

<h2>Մեր Հարսանիքը</h2>

<div class="grid">

<div class="card">
<i class="fa-solid fa-calendar"></i>
<h3>Ամսաթիվ</h3>
<p>27.06.2026</p>
</div>

<div class="card">
<i class="fa-solid fa-church"></i>
<h3>Պսակադրություն</h3>
<p>Սուրբ Հռիփսիմե Եկեղեցի</p>
</div>

<div class="card">
<i class="fa-solid fa-location-dot"></i>
<h3>Խնջույք</h3>
<p>Mkrtchyan’s Hall</p>
</div>

</div>

</section>

<div class="footer">
<i class="fa-solid fa-heart"></i>
Շնորհակալություն մեր օրը մեզ հետ կիսելու համար
</div>

<script>

const weddingDate = new Date("2026-06-27T00:00:00").getTime();

function updateCountdown(){

const now = new Date().getTime();
const distance = weddingDate - now;

const days = Math.floor(distance/(1000*60*60*24));
const hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const minutes = Math.floor((distance%(1000*60*60))/(1000*60));
const seconds = Math.floor((distance%(1000*60))/1000);

document.getElementById("days").innerHTML = days;
document.getElementById("hours").innerHTML = hours;
document.getElementById("minutes").innerHTML = minutes;
document.getElementById("seconds").innerHTML = seconds;

}

updateCountdown();
setInterval(updateCountdown,1000);

</script>

</body>
</html>
```
