<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
 
<title>Wedding Invitation</title>
 
<style>
 
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#8fa377;
    font-family: "Times New Roman", serif;
}
 
/* envelope */
 
.envelope{
    position:relative;
    width:320px;
    height:420px;
    background:#a5b78c;
    border-radius:10px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    overflow:hidden;
}
 
/* envelope top */
 
.flap{
    position:absolute;
    width:100%;
    height:200px;
    background:#9eb182;
    clip-path: polygon(0 0,100% 0,50% 100%);
    transform-origin:top;
    transition:1s;
    z-index:3;
}
 
/* wax seal */
 
.seal{
    position:absolute;
    width:80px;
    height:80px;
    background:white;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    font-weight:bold;
    color:#777;
    top:160px;
    left:50%;
    transform:translateX(-50%);
    z-index:4;
    cursor:pointer;
}
 
/* letter */
 
.letter{
    position:absolute;
    width:90%;
    height:90%;
    background:white;
    left:5%;
    top:5%;
    border-radius:10px;
    padding:25px;
    text-align:center;
    transform:translateY(100%);
    transition:1s;
}
 
.open .flap{
    transform:rotateX(180deg);
}
 
.open .letter{
    transform:translateY(0);
}
 
h1{
    font-size:26px;
}
 
p{
    font-size:18px;
    line-height:1.6;
}
 
</style>
</head>
 
<body>
 
<div class="envelope" id="envelope">
 
<div class="flap"></div>
 
<div class="seal" onclick="openInvite()">
AA
</div>
 
<div class="letter">
 
<h1>Հարսանեկան հրավեր</h1>
 
<p>
Սիրով հրավիրում ենք Ձեզ  
մասնակցելու մեր հարսանեկան արարողությանը
</p>
 
<p>
Արտյոմ և Անի
</p>
 
<p>
20 Հունիս 2026
</p>
 
</div>
 
</div>
 
<script>
 
function openInvite(){
document.getElementById("envelope").classList.add("open");
}
 
</script>
 
</body>
</html>
