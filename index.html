<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Անի & Արտյոմ — Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Cormorant Garamond', serif;
background:linear-gradient(#f8f5ee,#efe7d7);
color:#3c4a36;
text-align:center;
overflow-x:hidden;
}

/* floating animation */

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-15px);}
100%{transform:translateY(0px);}
}

@keyframes fade{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

/* decorative floating icons */

.decor{
position:fixed;
font-size:28px;
opacity:0.7;
animation:float 6s infinite ease-in-out;
}

.ring1{top:15%;left:10%;}
.ring2{top:70%;left:80%;animation-delay:2s;}
.champ1{top:60%;left:15%;animation-delay:1s;}
.champ2{top:25%;left:85%;animation-delay:3s;}

header{
padding:100px 20px;
background:rgba(111,127,92,0.85);
color:white;
animation:fade 2s;
}

header h1{
font-family:'Great Vibes', cursive;
font-size:60px;
margin:0;
}

header h2{
font-size:30px;
margin:10px 0;
}

header p{
font-size:22px;
margin-top:10px;
}

.date{
font-size:32px;
font-weight:bold;
margin-top:15px;
}

.countdown{
font-size:26px;
margin-top:15px;
}

section{
padding:70px 20px;
animation:fade 2.5s;
}

.card{
background:#ffffffcc;
backdrop-filter:blur(4px);
max-width:600px;
margin:35px auto;
padding:35px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.card h2{
margin-top:0;
font-size:30px;
}

footer{
background:#6f7f5c;
color:white;
padding:30px;
margin-top:40px;
font-size:18px;
}

/* corner flowers */

.corner{
position:fixed;
font-size:60px;
opacity:0.4;
}

.fl1{top:10px;left:10px;}
.fl2{top:10px;right:10px;}
.fl3{bottom:10px;left:10px;}
.fl4{bottom:10px;right:10px;}

</style>
</head>

<body>

<!-- floating decorations -->
<div class="decor ring1">💍</div>
<div class="decor ring2">💍</div>
<div class="decor champ1">🥂</div>
<div class="decor champ2">🥂</div>

<!-- flower corners -->
<div class="corner fl1">🌸</div>
<div class="corner fl2">🌸</div>
<div class="corner fl3">🌸</div>
<div class="corner fl4">🌸</div>

<header>

<h1>Անի Ներսեսյան</h1>
<h2>&</h2>
<h1>Արտյոմ Սիմոնյան</h1>

<p>Սիրով հրավիրում ենք Ձեզ մեր հարսանիքին</p>

<div class="date">27 Հունիս 2026</div>
<div class="countdown" id="countdown"></div>

</header>

<section>

<div class="card">
<h2>Պսակադրություն</h2>
<p>Սուրբ Հռիփսիմե եկեղեցի</p>
<p>Էջմիածին</p>
</div>

<div class="card">
<h2>Հարսանյաց Խնջույք</h2>
<p>Mkrtchyans Hall</p>
</div>

</section>

<footer>
<p>Սպասում ենք Ձեզ մեր կյանքի ամենաերջանիկ օրը միասին նշելու համար 🤍</p>
</footer>

<script>

var weddingDate = new Date("June 27, 2026 15:00:00").getTime();

var x = setInterval(function(){

var now = new Date().getTime();
var distance = weddingDate - now;

var days = Math.floor(distance / (1000 * 60 * 60 * 24));
var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
var seconds = Math.floor((distance % (1000 * 60)) / 1000);

document.getElementById("countdown").innerHTML =
days + " օր " +
hours + " ժամ " +
minutes + " րոպե " +
seconds + " վայրկյան";

if(distance < 0){
clearInterval(x);
document.getElementById("countdown").innerHTML = "Մեծ օրը եկավ!";
}

},1000);

</script>

</body>
</html>
