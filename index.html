```html
<!DOCTYPE html>
<html lang="hy">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* BOHEME FLORAL FONT */

@font-face {
font-family: "BohemeFloral";
src: url("fonts/BohemeFloral.woff") format("woff");
}

/* PAGE */

body{
margin:0;
background:#f6f5f1;
font-family:'Playfair Display', serif;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
padding:40px;
}

/* INVITATION CARD */

.card{

width:650px;
max-width:95%;

background:white;

position:relative;

padding:120px 80px;

box-shadow:0 25px 60px rgba(0,0,0,0.15);

text-align:center;

overflow:hidden;

}

/* FLORAL DECORATIONS */

.flower-top{

position:absolute;
top:0;
left:0;
width:100%;
opacity:.9;
pointer-events:none;

}

.flower-bottom{

position:absolute;
bottom:0;
left:0;
width:100%;
transform:rotate(180deg);
opacity:.9;
pointer-events:none;

}

/* NAMES */

.names{

font-family:"BohemeFloral", serif;
font-size:72px;
color:#4b564a;

margin-bottom:10px;

}

/* TEXT */

.invite-text{

font-size:20px;
letter-spacing:1px;
margin:20px 0;
color:#444;

}

/* DATE */

.date{

font-size:26px;
margin-top:10px;
color:#6c755f;

}

/* LOCATION */

.location{

margin-top:30px;
font-size:18px;
line-height:1.6;

}

/* DIVIDER */

.divider{

width:70px;
height:2px;

background:#a8ad8d;

margin:30px auto;

}

/* COUNTDOWN */

.countdown{

margin-top:30px;
font-size:20px;
color:#555;

}

/* MOBILE */

@media(max-width:600px){

.card{
padding:80px 30px;
}

.names{
font-size:48px;
}

}

</style>

</head>


<body>

<div class="card">

<img class="flower-top"
src="https://i.imgur.com/7bIYqYF.png">

<img class="flower-bottom"
src="https://i.imgur.com/7bIYqYF.png">


<div class="names">
Անի & Արտյոմ
</div>

<div class="invite-text">
Սիրով հրավիրում ենք Ձեզ մեր կյանքի ամենաերջանիկ օրը
</div>

<div class="date">
27 Հունիս 2026
</div>

<div class="divider"></div>

<div class="location">

Պսակադրություն<br>
Սուրբ Հռիփսիմե եկեղեցի — Էջմիածին

<br><br>

Հարսանյաց Խնջույք<br>
Mkrtchyans Hall

</div>

<div class="countdown" id="countdown"></div>

</div>


<script>

/* COUNTDOWN TIMER */

var weddingDate = new Date("June 27, 2026 15:00:00").getTime();

setInterval(function(){

var now = new Date().getTime();

var distance = weddingDate - now;

var days = Math.floor(distance / (1000*60*60*24));

var hours = Math.floor((distance % (1000*60*60*24))/(1000*60*60));

var minutes = Math.floor((distance % (1000*60*60))/(1000*60));

var seconds = Math.floor((distance % (1000*60))/1000);

document.getElementById("countdown").innerHTML =
days+" օր "+hours+" ժամ "+minutes+" րոպե "+seconds+" վայրկյան";

},1000);

</script>

</body>
</html>
```
