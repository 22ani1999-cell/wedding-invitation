```html
<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;600&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Cormorant Garamond',serif;
color:white;
text-align:center;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:
linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.45)),
url("https://images.unsplash.com/photo-1520854221256-17451cc331bf?q=80&w=2070");
background-size:cover;
background-position:center;
padding:20px;
}

/* small top text */

.invite-text{
font-family:'Cinzel',serif;
letter-spacing:4px;
font-size:16px;
margin-bottom:20px;
opacity:0.9;
}

/* names */

.names{
font-family:'Great Vibes',cursive;
font-size:85px;
line-height:1.2;
margin:20px 0;
}

/* date */

.date{
font-family:'Cinzel',serif;
font-size:20px;
letter-spacing:5px;
margin-bottom:40px;
}

/* countdown */

.countdown{
display:flex;
gap:25px;
}

.time-box{
background:rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
padding:18px 26px;
border-radius:10px;
}

.time-box span{
display:block;
font-size:34px;
font-weight:600;
}

</style>
</head>

<body>

<section class="hero">

<div class="invite-text">
SAVE THE DATE
</div>

<div class="names">
Արտյոմ Սիմոնյան <br> & <br> Անի Ներսեսյան
</div>

<div class="date">
27 ՀՈՒՆԻՍ 2026
</div>

<div class="countdown">

<div class="time-box">
<span id="days"></span>
օր
</div>

<div class="time-box">
<span id="hours"></span>
ժամ
</div>

<div class="time-box">
<span id="minutes"></span>
րոպե
</div>

<div class="time-box">
<span id="seconds"></span>
վայրկյան
</div>

</div>

</section>

<script>

const weddingDate = new Date("2026-06-27T00:00:00").getTime();

function updateCountdown(){

const now = new Date().getTime();
const distance = weddingDate - now;

document.getElementById("days").innerHTML =
Math.floor(distance/(1000*60*60*24));

document.getElementById("hours").innerHTML =
Math.floor((distance%(1000*60*60*24))/(1000*60*60));

document.getElementById("minutes").innerHTML =
Math.floor((distance%(1000*60*60))/(1000*60));

document.getElementById("seconds").innerHTML =
Math.floor((distance%(1000*60))/1000);

}

updateCountdown();
setInterval(updateCountdown,1000);

</script>

</body>
</html>
```
